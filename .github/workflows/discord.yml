name: GitHub → Discord Full Feed

on:
  push:
  pull_request:
  issues:
  release:
  workflow_run:
  create:
  delete:
  fork:
  watch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Webhook
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"

          if [ "$EVENT" = "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_URL="${{ github.event.head_commit.url }}"
            COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"

            PAYLOAD=$(cat <<EOF
{
  "embeds": [{
    "title": "🚀 Nouveau Commit",
    "description": "**$COMMIT_MSG**",
    "color": 3066993,
    "fields": [
      {"name": "Auteur", "value": "$COMMIT_AUTHOR", "inline": true},
      {"name": "Repository", "value": "$REPO", "inline": true}
    ],
    "footer": {
      "text": "Push effectué par $ACTOR"
    }
  }],
  "content": "$COMMIT_URL"
}
EOF
)

          elif [ "$EVENT" = "pull_request" ]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_USER="${{ github.event.pull_request.user.login }}"

            PAYLOAD=$(cat <<EOF
{
  "embeds": [{
    "title": "🔀 Pull Request",
    "description": "**$PR_TITLE**",
    "color": 3447003,
    "fields": [
      {"name": "Auteur", "value": "$PR_USER", "inline": true},
      {"name": "Repository", "value": "$REPO", "inline": true}
    ]
  }],
  "content": "$PR_URL"
}
EOF
)

          elif [ "$EVENT" = "workflow_run" ]; then
            WF_NAME="${{ github.event.workflow_run.name }}"
            WF_STATUS="${{ github.event.workflow_run.conclusion }}"
            WF_URL="${{ github.event.workflow_run.html_url }}"

            PAYLOAD=$(cat <<EOF
{
  "embeds": [{
    "title": "⚙️ Build / Action",
    "description": "**$WF_NAME** → $WF_STATUS**",
    "color": 15105570
  }],
  "content": "$WF_URL"
}
EOF
)

          else
            PAYLOAD="{\"content\": \"🔔 Event: $EVENT sur $REPO par $ACTOR\"}"
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               ${{ secrets.DISCORD_WEBHOOK }}
