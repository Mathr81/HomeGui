name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.0.0)'
        required: true
        type: string
      minecraft_version:
        description: 'Target Minecraft version'
        required: true
        default: '1.21.10'
        type: string
      title:
        description: 'Custom release title (optional)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      jar_name:     ${{ steps.find_jar.outputs.jar_name }}
      jar_path:     ${{ steps.find_jar.outputs.jar_path }}
      sources_path: ${{ steps.find_jar.outputs.sources_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
          cache-cleanup: on-success

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build --parallel --build-cache --no-daemon --warning-mode none

      - name: Identify release artifacts
        id: find_jar
        run: |
          JAR_PATH=$(find build/libs/ \
            -name "*.jar" \
            ! -name "*-sources*" \
            ! -name "*-dev*" \
            ! -name "*-shadow*" \
            ! -name "*-javadoc*" \
            | sort | tail -1)

          if [ -z "$JAR_PATH" ]; then
            echo "::error::No release JAR found in build/libs/"
            ls -la build/libs/ || true
            exit 1
          fi

          JAR_NAME=$(basename "$JAR_PATH")

          SOURCES_PATH=$(find build/libs/ -name "*-sources*.jar" | sort | tail -1 || true)

          echo "jar_path=$JAR_PATH"         >> "$GITHUB_OUTPUT"
          echo "jar_name=$JAR_NAME"         >> "$GITHUB_OUTPUT"
          echo "sources_path=${SOURCES_PATH:-}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: build/libs/*.jar
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release/

      - name: Generate release notes
        run: |
          VERSION="${{ inputs.version }}"
          MC_VERSION="${{ inputs.minecraft_version }}"
          JAR_NAME="${{ needs.build.outputs.jar_name }}"
          REPO="${{ github.repository }}"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s \`%h\`" --no-merges 2>/dev/null)
          [ -z "$COMMITS" ] && COMMITS="- No changes recorded since last release."

          cat > notes.md << EOF
          ## Changelog

          ${COMMITS}

          ---

          ## Download

          | Source | Link |
          |---|---|
          | Modrinth | [Download](https://modrinth.com/mod/homegui) |
          | GitHub | [${JAR_NAME}](../../releases/download/v${VERSION}/${JAR_NAME}) |
          | Discord | [Join](https://discord.gg/pnJhKuU2QK) |
          | Issues | [Report a bug](https://github.com/${REPO}/issues) |

          ---

          | Property | Value |
          |---|---|
          | Minecraft | \`${MC_VERSION}\` |
          | Mod Loader | Fabric |
          | Java | 21 |
          | Version | \`${VERSION}\` |
          EOF

      - name: Create or verify tag
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, reusing."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   v${{ inputs.version }}
          name:       ${{ inputs.title || format('HomeGUI v{0}', inputs.version) }}
          body_path:  notes.md
          files:      release/*.jar
          draft:      ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Release v${{ inputs.version }}

          | Field | Value |
          |---|---|
          | Tag | \`v${{ inputs.version }}\` |
          | Minecraft | \`${{ inputs.minecraft_version }}\` |
          | Artifact | \`${{ needs.build.outputs.jar_name }}\` |
          | Status | ${{ job.status }} |
          | URL | [View release](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}) |
          EOF
